services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amazon-reviews-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: amazon-reviews-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
