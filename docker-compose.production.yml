services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amazon-reviews-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_ROLE: backend
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: amazon-reviews-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
