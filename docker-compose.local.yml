services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amazon-reviews-backend-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost,http://127.0.0.1
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: amazon-reviews-frontend-local
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
