services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amazon-reviews-backend-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost,http://127.0.0.1
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: amazon-reviews-frontend-local
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
